<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>González Robles & Asociados - Manual Operativo</title>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons Core -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            React.useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const apiKey = ""; // El entorno proporciona la clave en tiempo de ejecución

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = React.useState(true);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [searchResults, setSearchResults] = React.useState(null);
            const [searchError, setSearchError] = React.useState(null);
            const [isSearching, setIsSearching] = React.useState(false);
            const [selectedClient, setSelectedClient] = React.useState(null);

            const [clients, setClients] = React.useState([
                { id: 'mm-01', name: "Max Mara", sector: "Textil / Lujo", status: "Activo", priority: "VIP Alta", icon: "store", info: "Especialista en retail de lujo italiano. Despacho integral de colecciones de temporada." },
                { id: 'bp-04', name: "Buche de Pescado", sector: "Pesca / Exportación", status: "Activo", priority: "Crítica", icon: "fish", info: "Exportación de vejigas natatorias. Alta regulación CITES y PROFEPA." },
                { id: 'ga-02', name: "Giorgio Armani", sector: "Textil", status: "Activo", priority: "Media", icon: "briefcase", info: "Importación de sastrería y accesorios masculinos premium." },
            ]);

            const [isAddingClient, setIsAddingClient] = React.useState(false);

            const handleAddClient = (newClient) => {
                setClients([...clients, { ...newClient, id: `c-${Date.now()}`, icon: "user" }]);
                setIsAddingClient(false);
            };

            // Implementación de búsqueda con Backoff Exponencial y reintentos (Máximo 5)
            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery) return;
                
                setIsSearching(true);
                setSearchResults(null);
                setSearchError(null);

                const executeSearch = async (attempt = 0) => {
                    const prompt = `Actúa como consultor senior de aduanas para González Robles & Asociados. 
                    El usuario consulta en español: "${searchQuery}". 
                    Tus tareas obligatorias son:
                    1. Traduce la consulta técnica al PORTUGUÉS.
                    2. Investiga la LIGIE 2026, NICOs y RRNAs vigentes en México.
                    3. Responde de forma profesional en ESPAÑOL.
                    4. Proporciona SIEMPRE la fracción arancelaria sugerida y términos clave en PORTUGUÉS para referencia internacional.
                    Se detallado con los permisos de economía, salud o medio ambiente.`;

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                tools: [{ "google_search": {} }]
                            })
                        });

                        if (!response.ok) {
                            if (attempt < 4 && (response.status === 429 || response.status >= 500)) {
                                const delay = Math.pow(2, attempt) * 1000;
                                await new Promise(resolve => setTimeout(resolve, delay));
                                return executeSearch(attempt + 1);
                            }
                            throw new Error("Error en la comunicación con la inteligencia.");
                        }

                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!text) throw new Error("La IA no devolvió contenido.");

                        const sources = result.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({ 
                            uri: a.web?.uri, 
                            title: a.web?.title 
                        })) || [];

                        setSearchResults({ text, sources });
                    } catch (err) {
                        if (attempt < 4) {
                            const delay = Math.pow(2, attempt) * 1000;
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return executeSearch(attempt + 1);
                        }
                        setSearchError("No se pudo completar la consulta. Por favor, intente más tarde o verifique los parámetros de búsqueda.");
                        console.error(err);
                    } finally {
                        if (attempt === 0 || attempt >= 4) setIsSearching(false);
                    }
                };

                executeSearch();
            };

            const navigateToClient = (client) => {
                if (client.id === 'mm-01') setActiveTab('maxmara');
                else if (client.id === 'bp-04') setActiveTab('buche');
                else {
                    setSelectedClient(client);
                    setActiveTab('client-detail');
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className={`${sidebarOpen ? 'w-72' : 'w-20'} bg-[#0F172A] text-white transition-all duration-300 flex flex-col z-20 shadow-2xl`}>
                        <div className="p-6 flex items-center gap-3 border-b border-white/10 min-h-[80px]">
                            <div className="bg-emerald-500 p-2 rounded-lg shrink-0 shadow-lg shadow-emerald-500/50">
                                <LucideIcon name="building-2" size={24} />
                            </div>
                            {sidebarOpen && (
                                <div className="flex flex-col leading-tight animate-in">
                                    <span className="font-bold text-sm uppercase tracking-tight">González Robles</span>
                                    <span className="text-[10px] text-slate-400 font-medium">& Asociados</span>
                                </div>
                            )}
                        </div>
                        <nav className="flex-1 py-6 px-3 space-y-2 overflow-y-auto custom-scrollbar">
                            <NavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="layout-dashboard" label="Inicio" open={sidebarOpen} />
                            <NavItem active={activeTab === 'clients'} onClick={() => setActiveTab('clients')} icon="users" label="Cartera de Clientes" open={sidebarOpen} />
                            <NavItem active={activeTab === 'maxmara'} onClick={() => setActiveTab('maxmara')} icon="shopping-bag" label="Max Mara VIP" open={sidebarOpen} />
                            <NavItem active={activeTab === 'buche'} onClick={() => setActiveTab('buche')} icon="fish" label="Buche de Pescado" open={sidebarOpen} />
                            <NavItem active={activeTab === 'ligie'} onClick={() => setActiveTab('ligie')} icon="book-open" label="LIGIE 2026" open={sidebarOpen} />
                            <NavItem active={activeTab === 'emergency'} onClick={() => setActiveTab('emergency')} icon="alert-octagon" label="Protocolos SOS" open={sidebarOpen} />
                        </nav>
                        <div className="p-4 text-[9px] text-slate-500 font-bold uppercase text-center border-t border-white/5 tracking-widest italic">
                            {sidebarOpen ? 'Plataforma Corporativa v7.2' : 'GR&A'}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden bg-[#F8FAFC]">
                        <header className="h-20 bg-white border-b flex items-center justify-between px-8 z-10 shadow-sm">
                            <div className="flex items-center gap-4 flex-1">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors">
                                    <LucideIcon name="menu" />
                                </button>
                                <form onSubmit={handleSearch} className="relative w-full max-w-md group">
                                    <input 
                                        type="text" 
                                        placeholder="Traducir y buscar fracción (LIGIE 2026)..." 
                                        className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border rounded-full text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-inner border-slate-200"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                    <div className="absolute left-3 top-3 text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                                        <LucideIcon name="languages" size={18} />
                                    </div>
                                </form>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Consultoría Técnica</p>
                                    <p className="text-sm font-bold text-slate-800 italic">Global Sync Active</p>
                                </div>
                                <div className="w-10 h-10 bg-[#0F172A] rounded-full flex items-center justify-center font-bold text-white shadow-lg border border-white/10">GR</div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-8 custom-scrollbar relative">
                            <div className="max-w-6xl mx-auto space-y-8 animate-in">
                                {isSearching && <SearchLoader />}
                                {searchError && (
                                    <div className="bg-rose-50 border border-rose-200 text-rose-700 p-4 rounded-2xl flex items-center gap-3 animate-in">
                                        <LucideIcon name="alert-circle" />
                                        <p className="text-sm font-medium">{searchError}</p>
                                    </div>
                                )}
                                {searchResults && <SearchResults results={searchResults} onClose={() => setSearchResults(null)} />}
                                
                                {activeTab === 'dashboard' && <Dashboard setActiveTab={setActiveTab} count={clients.length} />}
                                {activeTab === 'clients' && <ClientsTable clients={clients} onSelect={navigateToClient} onAdd={() => setIsAddingClient(true)} />}
                                {activeTab === 'maxmara' && <MaxMaraView onBack={() => setActiveTab('clients')} />}
                                {activeTab === 'buche' && <BucheView onBack={() => setActiveTab('clients')} />}
                                {activeTab === 'client-detail' && <ClientDetail client={selectedClient} onBack={() => setActiveTab('clients')} />}
                                {activeTab === 'ligie' && <LigieTechnical />}
                                {activeTab === 'emergency' && <EmergencyProtocols />}
                            </div>
                        </main>
                    </div>
                    {isAddingClient && <AddClientModal onAdd={handleAddClient} onClose={() => setIsAddingClient(false)} />}
                </div>
            );
        };

        // --- COMPONENTES ---

        const NavItem = ({ active, onClick, icon, label, open }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all ${active ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                <LucideIcon name={icon} size={20} />
                {open && <span className="font-semibold text-sm truncate tracking-tight">{label}</span>}
            </button>
        );

        const Dashboard = ({ setActiveTab, count }) => (
            <div className="space-y-8">
                <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 border-l-[12px] border-l-emerald-500">
                    <h1 className="text-4xl font-light text-slate-900 mb-2 tracking-tighter">Portal Corporativo <span className="font-bold italic">GR&A</span></h1>
                    <p className="text-slate-500 text-lg font-medium">Gestión estratégica de comercio exterior y procesos aduaneros de alta gama.</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <DashboardCard title="Cartera Clientes" icon="users" color="text-blue-600" onClick={() => setActiveTab('clients')} />
                    <DashboardCard title="Max Mara VIP" icon="shopping-bag" color="text-purple-600" onClick={() => setActiveTab('maxmara')} />
                    <DashboardCard title="Buche CITES" icon="fish" color="text-emerald-600" onClick={() => setActiveTab('buche')} />
                    <DashboardCard title="Protocolos SOS" icon="alert-triangle" color="text-rose-600" onClick={() => setActiveTab('emergency')} />
                </div>
            </div>
        );

        const DashboardCard = ({ title, icon, onClick, color }) => (
            <button onClick={onClick} className="bg-white p-8 rounded-[2.5rem] border hover:shadow-2xl transition-all text-left shadow-sm group hover:border-emerald-200">
                <div className={`p-4 bg-slate-50 rounded-2xl w-fit mb-6 shadow-inner ${color} group-hover:scale-110 transition-transform border border-slate-100`}>
                    <LucideIcon name={icon} size={24} />
                </div>
                <h3 className="font-bold text-lg text-slate-800 italic underline decoration-slate-100 decoration-4">{title}</h3>
                <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mt-2">Consultar</p>
            </button>
        );

        const ClientsTable = ({ clients, onSelect, onAdd }) => (
            <div className="bg-white rounded-[2.5rem] border shadow-xl overflow-hidden border-slate-200">
                <div className="p-8 border-b flex justify-between items-center bg-slate-50">
                    <h2 className="text-2xl font-bold italic tracking-tighter uppercase text-slate-800">Cartera Corporativa</h2>
                    <button onClick={onAdd} className="bg-[#0F172A] text-white px-6 py-2.5 rounded-full font-black text-xs uppercase hover:bg-emerald-600 transition-all flex items-center gap-2 shadow-xl">
                        <LucideIcon name="plus" size={16} /> Alta Socio
                    </button>
                </div>
                <table className="w-full text-left">
                    <thead>
                        <tr className="text-[10px] font-black uppercase text-slate-400 bg-slate-50/50 border-b tracking-widest">
                            <th className="p-6">Socio Comercial</th><th className="p-6">Sector</th><th className="p-6 text-center">Operación</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                        {clients.map(c => (
                            <tr key={c.id} className="hover:bg-slate-50 transition-colors group cursor-pointer" onClick={() => onSelect(c)}>
                                <td className="p-6 flex items-center gap-4">
                                    <div className="w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center font-bold shadow-lg group-hover:bg-emerald-600 transition-colors">
                                        <LucideIcon name={c.icon} size={18} />
                                    </div>
                                    <span className="font-black italic text-slate-800 text-lg tracking-tight group-hover:translate-x-1 transition-transform">{c.name}</span>
                                </td>
                                <td className="p-6 text-xs font-bold text-slate-500 uppercase italic tracking-widest">{c.sector}</td>
                                <td className="p-6 text-center">
                                    <div className="flex justify-center gap-2">
                                        <button className="p-3 bg-slate-100 text-slate-600 rounded-xl hover:bg-emerald-600 hover:text-white transition-all shadow-sm">
                                            <LucideIcon name="eye" size={18} />
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        );

        const MaxMaraView = ({ onBack }) => {
            const [selected, setSelected] = React.useState(null);
            const products = [
                { id: 1, name: "Calzado / Zapatos", tigie: "6403.51.01.01", legal: "Art. 36-A LA (Documentación).", process: "Precios estimados DOF." },
                { id: 2, name: "Telas de Algodón", tigie: "6109.10.01.00", legal: "LIGIE Sec. XI.", process: "NOM-004 de origen." }
            ];
            return (
                <div className="space-y-8 animate-in">
                    <button onClick={onBack} className="flex items-center gap-2 text-slate-400 font-bold uppercase text-[10px] tracking-widest hover:text-emerald-600 transition-colors"><LucideIcon name="arrow-left" /> Volver</button>
                    <div className="bg-white border p-10 rounded-[3rem] shadow-sm flex items-center gap-10 border-l-8 border-l-[#0F172A]">
                        <div className="w-24 h-24 bg-[#0F172A] text-white rounded-full flex items-center justify-center font-serif text-4xl shadow-2xl">MM</div>
                        <div><h2 className="text-4xl font-bold text-slate-900 font-serif tracking-tighter italic">Max Mara Italia</h2><p className="text-slate-500 font-medium italic underline decoration-slate-100 uppercase text-xs tracking-widest">Premium Retail Logistics</p></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {products.map(p => (
                            <button key={p.id} onClick={() => setSelected(p)} className={`p-8 bg-white border rounded-[2rem] text-left transition-all group ${selected?.id === p.id ? 'border-emerald-500 ring-2 ring-emerald-50' : 'hover:border-emerald-500'}`}>
                                <LucideIcon name="package" className="mb-4 text-emerald-600" size={28} />
                                <h4 className="font-bold italic text-lg">{p.name}</h4>
                                <p className="text-[10px] font-black text-slate-400 mt-1 uppercase tracking-tighter">TIGIE: {p.tigie}</p>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const BucheView = ({ onBack }) => (
            <div className="space-y-8 animate-in">
                <button onClick={onBack} className="flex items-center gap-2 text-slate-400 font-bold uppercase text-[10px] tracking-widest hover:text-emerald-600 transition-colors"><LucideIcon name="arrow-left" /> Volver</button>
                <div className="bg-white border p-10 rounded-[3rem] shadow-sm flex items-center gap-10 border-l-8 border-l-emerald-600">
                    <div className="w-24 h-24 bg-emerald-600 text-white rounded-full flex items-center justify-center text-4xl shadow-2xl border-4 border-white"><LucideIcon name="fish" size={44} /></div>
                    <div><h2 className="text-4xl font-bold text-slate-900 tracking-tighter italic">Buche de Pescado</h2><p className="text-slate-500 font-medium italic underline decoration-emerald-100 uppercase tracking-widest font-black text-xs">Maw Export Strategic Partner</p></div>
                </div>
                <div className="bg-[#0F172A] text-white p-12 rounded-[3rem] shadow-2xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-12 opacity-5"><LucideIcon name="shield-check" size={200} /></div>
                    <h4 className="text-emerald-400 font-bold italic text-2xl border-b border-white/10 pb-6 mb-8 tracking-widest uppercase underline decoration-emerald-500/20">Blindaje Jurídico CITES</h4>
                    <ul className="space-y-6 text-sm italic leading-relaxed text-slate-300 relative z-10">
                        <li className="flex gap-5 items-start"><LucideIcon name="check-circle" className="text-emerald-500 shrink-0 mt-1" size={24} /> <div><p className="font-bold text-white uppercase text-xs mb-1 tracking-widest">Certificación Internacional</p> Permiso SEMARNAT CITES (Apendice II) validado para exportación global.</div></li>
                        <li className="flex gap-5 items-start"><LucideIcon name="check-circle" className="text-emerald-500 shrink-0 mt-1" size={24} /> <div><p className="font-bold text-white uppercase text-xs mb-1 tracking-widest">Control Físico</p> Inspección PROFEPA obligatoria en punto de despacho para validación de especie.</div></li>
                    </ul>
                </div>
            </div>
        );

        const ClientDetail = ({ client, onBack }) => (
            <div className="space-y-8 animate-in">
                <button onClick={onBack} className="flex items-center gap-2 text-slate-400 font-bold uppercase text-[10px] tracking-widest"><LucideIcon name="arrow-left" /> Volver</button>
                <div className="bg-white p-10 rounded-[3rem] shadow-sm flex items-center gap-10 border border-slate-100">
                    <div className="w-32 h-32 bg-slate-900 text-white rounded-full flex items-center justify-center text-4xl shadow-2xl font-serif border-8 border-slate-50 uppercase tracking-tighter">CL</div>
                    <div>
                        <h2 className="text-4xl font-bold text-slate-900 tracking-tighter italic underline decoration-slate-100 underline-offset-8">{client?.name}</h2>
                        <p className="text-slate-500 text-xl font-medium mt-1 uppercase tracking-widest text-xs font-black">{client?.sector}</p>
                        <p className="mt-6 text-slate-400 text-sm max-w-xl italic leading-relaxed font-medium tracking-tight">{client?.info}</p>
                    </div>
                </div>
                <div className="p-10 bg-[#0F172A] text-white rounded-[2.5rem] text-center border border-white/5 opacity-50 uppercase text-[10px] font-black tracking-[0.3em] italic flex flex-col items-center gap-4">
                    <LucideIcon name="settings" size={32} />
                    Módulo de Documentación Aduanera en Desarrollo.
                </div>
            </div>
        );

        const AddClientModal = ({ onAdd, onClose }) => {
            const [formData, setFormData] = React.useState({ name: '', sector: '', status: 'Activo', info: '' });
            return (
                <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in">
                    <div className="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl overflow-hidden border border-slate-200">
                        <div className="p-10 border-b bg-slate-50 flex justify-between items-center">
                            <div><h2 className="text-3xl font-bold italic tracking-tighter text-slate-900">Nuevo <span className="text-emerald-600">Socio Comercial</span></h2><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-black tracking-[0.2em]">González Robles & Asociados</p></div>
                            <button onClick={onClose} className="p-2 text-slate-400 hover:text-rose-500 transition-colors"><LucideIcon name="x" size={28} /></button>
                        </div>
                        <form className="p-10 space-y-6" onSubmit={(e) => { e.preventDefault(); onAdd(formData); }}>
                            <div className="grid grid-cols-2 gap-6">
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nombre Empresa</label><input required className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold italic shadow-inner" onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Sector Comercial</label><input required className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold italic shadow-inner" onChange={e => setFormData({...formData, sector: e.target.value})} /></div>
                            </div>
                            <button type="submit" className="w-full bg-[#0F172A] text-white p-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-2xl hover:bg-emerald-600 transition-all">Registrar Socio</button>
                        </form>
                    </div>
                </div>
            );
        };

        const LigieTechnical = () => (
            <div className="space-y-8 animate-in">
                <div className="bg-white p-10 rounded-[3rem] border shadow-sm border-l-[12px] border-l-emerald-500"><h2 className="text-3xl font-bold italic text-slate-900 uppercase tracking-tighter">Manual Técnico LIGIE 2026</h2><p className="text-slate-500 italic font-medium uppercase text-xs tracking-widest">Sincronización con la Séptima Enmienda</p></div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 italic text-sm">
                    <div className="p-10 bg-white border rounded-[3rem] shadow-xl space-y-8">
                        <p className="font-black text-emerald-600 uppercase tracking-[0.2em] border-b border-emerald-100 pb-3">Estructura Arancelaria</p>
                        <div className="space-y-6">
                            <div className="flex gap-5 items-center"><div className="w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-mono font-bold text-xl shadow-xl">61</div><p className="font-bold underline text-slate-800 italic">Capítulo Têxtil (Ponto)</p></div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const EmergencyProtocols = () => (
            <div className="space-y-8 animate-in">
                <div className="bg-rose-50 p-10 rounded-[3rem] border border-rose-100 border-l-[12px] border-l-rose-600 shadow-sm">
                    <h2 className="text-3xl font-bold text-rose-600 italic uppercase tracking-tighter">Protocolos de Crisis SOS | PAMA</h2>
                    <p className="text-rose-400 font-black text-[10px] uppercase tracking-widest mt-1">Defensa Legal Inmediata en Aduana</p>
                </div>
            </div>
        );

        // --- COMPONENTES DE UI ---

        const SearchLoader = () => (
            <div className="bg-white p-12 rounded-[4rem] border border-emerald-200 shadow-2xl flex items-center justify-center gap-8 animate-pulse border-b-8 border-b-emerald-500">
                <div className="p-4 bg-emerald-50 rounded-full shadow-inner"><LucideIcon name="loader-2" className="animate-spin text-emerald-600" size={44} /></div>
                <div>
                    <p className="font-black text-slate-800 italic text-2xl tracking-tighter uppercase underline decoration-emerald-100 underline-offset-4">González Robles Intelligence</p>
                    <p className="text-[10px] text-slate-400 uppercase tracking-[0.3em] font-black italic">Traduciendo y analizando LIGIE 2026...</p>
                </div>
            </div>
        );

        const SearchResults = ({ results, onClose }) => (
            <div className="bg-white p-12 rounded-[4rem] border border-slate-200 shadow-2xl relative animate-in border-t-[12px] border-t-emerald-600 overflow-hidden">
                <div className="absolute top-0 right-0 p-12 opacity-5 pointer-events-none"><LucideIcon name="book-open" size={240} /></div>
                <button onClick={onClose} className="absolute top-8 right-8 text-slate-300 hover:text-rose-500 transition-all p-2 hover:bg-slate-50 rounded-full"><LucideIcon name="x" size={32} /></button>
                <div className="flex items-center gap-4 mb-8 text-emerald-600 font-black uppercase text-xs tracking-[0.3em] bg-emerald-50 w-fit px-6 py-2 rounded-full border border-emerald-100">
                    <LucideIcon name="languages" size={20} /> Inteligencia Aduanera Bilingüe
                </div>
                <div className="text-lg leading-relaxed whitespace-pre-line mb-10 italic text-slate-700 font-medium max-h-[450px] overflow-y-auto pr-8 custom-scrollbar relative z-10 font-serif border-l-4 border-emerald-50 pl-6">
                    {String(results.text)}
                </div>
                {results.sources?.length > 0 && (
                    <div className="border-t border-slate-100 pt-8 relative z-10">
                        <p className="text-[10px] font-black text-slate-400 uppercase mb-5 tracking-[0.2em] italic ml-1 underline decoration-slate-100">Fuentes Técnicas Internacionales:</p>
                        <div className="flex flex-wrap gap-3">
                            {results.sources.map((s, i) => (
                                <a key={i} href={s.uri} target="_blank" className="text-[10px] text-emerald-700 bg-emerald-50 border border-emerald-200 px-4 py-2 rounded-full font-bold hover:bg-emerald-600 hover:text-white transition-all shadow-sm uppercase tracking-tight">
                                    {s.title}
                                </a>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
