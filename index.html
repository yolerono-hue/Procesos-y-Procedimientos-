<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>González Robles & Asociados - Manual Operativo</title>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Helper para renderizar iconos de forma segura en React sin errores de constructor
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const apiKey = "";

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = React.useState(true);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [searchResults, setSearchResults] = React.useState(null);
            const [isSearching, setIsSearching] = React.useState(false);
            const [selectedClient, setSelectedClient] = React.useState(null);

            // Estado de Clientes
            const [clients, setClients] = React.useState([
                { id: 'mm-01', name: "Max Mara", sector: "Textil / Lujo", status: "Activo", priority: "VIP Alta", icon: "store", info: "Especialista en retail de lujo italiano. Despacho integral de colecciones de temporada." },
                { id: 'bp-04', name: "Buche de Pescado", sector: "Pesca / Exportación", status: "Activo", priority: "Crítica", icon: "fish", info: "Exportación de vejigas natatorias. Alta regulación CITES y PROFEPA." },
                { id: 'ga-02', name: "Giorgio Armani", sector: "Textil", status: "Activo", priority: "Media", icon: "briefcase", info: "Importación de sastrería y accesorios masculinos premium." },
            ]);

            const [isAddingClient, setIsAddingClient] = React.useState(false);

            const handleAddClient = (newClient) => {
                setClients([...clients, { ...newClient, id: `c-${Date.now()}`, icon: "user" }]);
                setIsAddingClient(false);
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery) return;
                setIsSearching(true);
                setSearchResults(null);
                
                try {
                    // La instrucción ahora incluye explícitamente la traducción al portugués
                    const prompt = `Traduce mi consulta de español a portugués y luego actúa como un experto en aduanas. Consulta la LIGIE 2026 y RRNAs para: ${searchQuery}. Explica los resultados en español pero incluye los términos técnicos y fracciones en portugués para referencia internacional.`;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "google_search": {} }]
                        })
                    });
                    
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "No se obtuvo respuesta.";
                    const sources = result.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({ uri: a.web?.uri, title: a.web?.title })) || [];
                    
                    setSearchResults({ text, sources });
                } catch (err) {
                    console.error(err);
                } finally {
                    setIsSearching(false);
                }
            };

            const navigateToClient = (client) => {
                if (client.id === 'mm-01') setActiveTab('maxmara');
                else if (client.id === 'bp-04') setActiveTab('buche');
                else {
                    setSelectedClient(client);
                    setActiveTab('client-detail');
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar con Branding González Robles */}
                    <aside className={`${sidebarOpen ? 'w-72' : 'w-20'} bg-[#0F172A] text-white transition-all duration-300 flex flex-col z-20 shadow-2xl`}>
                        <div className="p-6 flex items-center gap-3 border-b border-white/10 min-h-[80px]">
                            <div className="bg-emerald-500 p-2 rounded-lg shrink-0">
                                <LucideIcon name="building-2" size={24} />
                            </div>
                            {sidebarOpen && (
                                <div className="flex flex-col leading-tight animate-fade-in">
                                    <span className="font-bold text-sm uppercase">González Robles</span>
                                    <span className="text-[10px] text-slate-400">& Asociados</span>
                                </div>
                            )}
                        </div>
                        <nav className="flex-1 py-6 px-3 space-y-2 overflow-y-auto custom-scrollbar">
                            <NavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="globe" label="Inicio" open={sidebarOpen} />
                            <NavItem active={activeTab === 'clients'} onClick={() => setActiveTab('clients')} icon="users" label="Cartera de Clientes" open={sidebarOpen} />
                            <NavItem active={activeTab === 'maxmara'} onClick={() => setActiveTab('maxmara')} icon="store" label="Max Mara VIP" open={sidebarOpen} />
                            <NavItem active={activeTab === 'buche'} onClick={() => setActiveTab('buche')} icon="fish" label="Buche de Pescado" open={sidebarOpen} />
                            <NavItem active={activeTab === 'ligie'} onClick={() => setActiveTab('ligie')} icon="book-open" label="LIGIE 2026" open={sidebarOpen} />
                            <NavItem active={activeTab === 'emergency'} onClick={() => setActiveTab('emergency')} icon="alert-circle" label="Protocolos SOS" open={sidebarOpen} />
                        </nav>
                        <div className="p-4 text-[10px] text-slate-500 font-bold uppercase text-center border-t border-white/5">
                            {sidebarOpen ? 'Consultoría Integral' : 'GR&A'}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden relative bg-[#F8FAFC]">
                        <header className="h-20 bg-white border-b flex items-center justify-between px-8 z-10 shadow-sm">
                            <div className="flex items-center gap-4 flex-1">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600">
                                    <LucideIcon name="menu" />
                                </button>
                                <form onSubmit={handleSearch} className="relative w-full max-w-md group">
                                    <input 
                                        type="text" 
                                        placeholder="Escribe en español para traducir y buscar..." 
                                        className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border rounded-full text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                    <div className="absolute left-3 top-3 text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                                        <LucideIcon name="languages" size={18} />
                                    </div>
                                </form>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-black text-slate-400 uppercase">Estado Operativo</p>
                                    <p className="text-sm font-bold text-slate-800 italic">En Línea 2026</p>
                                </div>
                                <div className="w-10 h-10 bg-[#0F172A] rounded-full flex items-center justify-center font-bold text-white">GR</div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            <div className="max-w-6xl mx-auto space-y-8 animate-fade-in">
                                {isSearching && <SearchLoader />}
                                {searchResults && <SearchResults results={searchResults} onClose={() => setSearchResults(null)} />}
                                
                                {activeTab === 'dashboard' && <Dashboard setActiveTab={setActiveTab} count={clients.length} />}
                                {activeTab === 'clients' && <ClientsTable clients={clients} onSelect={navigateToClient} onAdd={() => setIsAddingClient(true)} />}
                                {activeTab === 'maxmara' && <MaxMaraView onBack={() => setActiveTab('clients')} />}
                                {activeTab === 'buche' && <BucheView onBack={() => setActiveTab('clients')} />}
                                {activeTab === 'client-detail' && <ClientDetail client={selectedClient} onBack={() => setActiveTab('clients')} />}
                                {activeTab === 'ligie' && <LigieTechnical />}
                                {activeTab === 'emergency' && <EmergencyProtocols />}
                            </div>
                        </main>
                    </div>
                    {isAddingClient && <AddClientModal onAdd={handleAddClient} onClose={() => setIsAddingClient(false)} />}
                </div>
            );
        };

        // --- COMPONENTES DE VISTAS ---

        const NavItem = ({ active, onClick, icon, label, open }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all ${active ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                <LucideIcon name={icon} size={20} />
                {open && <span className="font-medium text-sm truncate">{label}</span>}
            </button>
        );

        const Dashboard = ({ setActiveTab, count }) => (
            <div className="space-y-8">
                <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 border-l-8 border-l-emerald-500">
                    <h1 className="text-4xl font-light text-slate-900 mb-2">González Robles <span className="font-bold italic">& Asociados</span></h1>
                    <p className="text-slate-500 text-lg">Especialistas en logística de lujo y exportación de mercancías críticas.</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <DashboardCard title="Cartera de Clientes" icon="users" color="text-blue-600" onClick={() => setActiveTab('clients')} />
                    <DashboardCard title="Despacho Max Mara" icon="store" color="text-purple-600" onClick={() => setActiveTab('maxmara')} />
                    <DashboardCard title="Buche de Pescado" icon="fish" color="text-emerald-600" onClick={() => setActiveTab('buche')} />
                    <DashboardCard title="Protocolos SOS" icon="alert-triangle" color="text-rose-600" onClick={() => setActiveTab('emergency')} />
                </div>
            </div>
        );

        const DashboardCard = ({ title, icon, onClick, color }) => (
            <button onClick={onClick} className="bg-white p-8 rounded-[2.5rem] border hover:shadow-2xl transition-all text-left shadow-sm group">
                <div className={`p-4 bg-slate-50 rounded-2xl w-fit mb-6 shadow-inner ${color} group-hover:scale-110 transition-transform`}>
                    <LucideIcon name={icon} size={24} />
                </div>
                <h3 className="font-bold text-lg text-slate-800 italic">{title}</h3>
                <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mt-1">Ver Módulo</p>
            </button>
        );

        const ClientsTable = ({ clients, onSelect, onAdd }) => (
            <div className="bg-white rounded-[2.5rem] border shadow-xl overflow-hidden">
                <div className="p-8 border-b flex justify-between items-center bg-slate-50">
                    <h2 className="text-2xl font-bold italic tracking-tighter">Cartera de Clientes</h2>
                    <button onClick={onAdd} className="bg-[#0F172A] text-white px-6 py-2 rounded-full font-bold text-xs hover:bg-emerald-600 transition-all flex items-center gap-2">
                        <LucideIcon name="plus" size={16} /> Nuevo
                    </button>
                </div>
                <table className="w-full text-left">
                    <thead>
                        <tr className="text-[10px] font-black uppercase text-slate-400 bg-slate-50 border-b">
                            <th className="p-6">Nombre Comercial</th><th className="p-6">Sector</th><th className="p-6">Estatus</th><th className="p-6 text-center">Ficha</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y">
                        {clients.map(c => (
                            <tr key={c.id} className="hover:bg-slate-50/50 transition-colors">
                                <td className="p-6 flex items-center gap-4">
                                    <div className="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center font-bold text-[10px]">{c.icon === "store" ? "VIP" : "CL"}</div>
                                    <span className="font-black italic text-slate-800">{c.name}</span>
                                </td>
                                <td className="p-6 text-xs font-bold text-slate-500 italic">{c.sector}</td>
                                <td className="p-6"><span className="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-black uppercase">{c.status}</span></td>
                                <td className="p-6 text-center"><button onClick={() => onSelect(c)} className="p-2 bg-[#0F172A] text-white rounded-lg hover:bg-emerald-600 transition-all"><LucideIcon name="eye" size={18} /></button></td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        );

        const MaxMaraView = ({ onBack }) => {
            const [selected, setSelected] = React.useState(null);
            const products = [
                { id: 1, name: "Calzado / Zapatos", tigie: "6403.51.01.01", legal: "Art. 36-A LA (Documentos).", process: "Validación precios SHCP." },
                { id: 2, name: "Telas de Algodón", tigie: "6109.10.01.00", legal: "LIGIE Sec. XI.", process: "Etiquetado NOM-004." }
            ];
            return (
                <div className="space-y-8">
                    <button onClick={onBack} className="flex items-center gap-2 text-slate-400 font-bold uppercase text-[10px] tracking-widest"><LucideIcon name="arrow-left" /> Volver</button>
                    <div className="bg-white border p-10 rounded-[3rem] shadow-sm flex items-center gap-10">
                        <div className="w-24 h-24 bg-[#0F172A] text-white rounded-full flex items-center justify-center text-4xl font-serif">MM</div>
                        <div><h2 className="text-4xl font-bold text-slate-900 font-serif">Max Mara Italia</h2><p className="text-slate-500 font-medium">Protocolo de Lujo 2026</p></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {products.map(p => (
                            <button key={p.id} onClick={() => setSelected(p)} className="p-8 bg-white border rounded-[2rem] text-left hover:border-emerald-500 transition-all shadow-sm">
                                <LucideIcon name="package" className="mb-4 text-emerald-600" />
                                <h4 className="font-bold italic text-lg">{p.name}</h4>
                                <p className="text-[10px] font-black text-slate-400 mt-1 uppercase">TIGIE: {p.tigie}</p>
                            </button>
                        ))}
                    </div>
                    {selected && (
                        <div className="p-10 bg-white border-2 border-emerald-500 rounded-[3rem] shadow-2xl relative animate-fade-in">
                            <button onClick={() => setSelected(null)} className="absolute top-6 right-6 text-slate-400"><LucideIcon name="x" size={24} /></button>
                            <h4 className="text-2xl font-black italic mb-6">{selected.name}</h4>
                            <div className="grid grid-cols-2 gap-8 text-sm italic">
                                <div className="p-6 bg-slate-50 rounded-2xl">
                                    <p className="text-[10px] font-bold text-emerald-600 uppercase mb-2">Fundamento Legal</p>
                                    <p>{selected.legal}</p>
                                </div>
                                <div className="p-6 bg-emerald-50 rounded-2xl">
                                    <p className="text-[10px] font-bold text-emerald-600 uppercase mb-2">Procedimiento</p>
                                    <p>{selected.process}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const BucheView = ({ onBack }) => (
            <div className="space-y-8 animate-fade-in">
                <button onClick={onBack} className="flex items-center gap-2 text-slate-400 font-bold uppercase text-[10px] tracking-widest"><LucideIcon name="arrow-left" /> Volver</button>
                <div className="bg-white border p-10 rounded-[3rem] shadow-sm flex items-center gap-10">
                    <div className="w-24 h-24 bg-emerald-600 text-white rounded-full flex items-center justify-center text-4xl shadow-xl"><LucideIcon name="fish" size={40} /></div>
                    <div><h2 className="text-4xl font-bold text-slate-900">Buche de Pescado</h2><p className="text-slate-500 font-medium italic underline decoration-emerald-100 uppercase tracking-widest">Maw Export Specialist</p></div>
                </div>
                <div className="bg-[#0F172A] text-white p-10 rounded-[2.5rem] shadow-2xl">
                    <h4 className="text-emerald-400 font-bold italic text-xl border-b border-white/10 pb-4 mb-6 tracking-widest">REGULACIÓN CRÍTICA CITES</h4>
                    <ul className="space-y-4 text-sm italic leading-relaxed text-slate-300">
                        <li className="flex gap-4"><LucideIcon name="shield-check" className="text-emerald-500 shrink-0" /> Permiso SEMARNAT CITES (Apendice II).</li>
                        <li className="flex gap-4"><LucideIcon name="shield-check" className="text-emerald-500 shrink-0" /> Inspección física PROFEPA en puerto de salida (Obligatorio).</li>
                        <li className="flex gap-4"><LucideIcon name="shield-check" className="text-emerald-500 shrink-0" /> Fracción: 0305.72.01.00 (NICO 00).</li>
                    </ul>
                </div>
            </div>
        );

        const ClientDetail = ({ client, onBack }) => (
            <div className="space-y-8">
                <button onClick={onBack} className="flex items-center gap-2 text-slate-400 font-bold uppercase text-[10px] tracking-widest"><LucideIcon name="arrow-left" /> Volver</button>
                <div className="bg-white p-10 rounded-[3rem] shadow-sm flex items-center gap-10">
                    <div className="w-32 h-32 bg-slate-900 text-white rounded-full flex items-center justify-center text-4xl shadow-2xl uppercase font-serif">CL</div>
                    <div>
                        <h2 className="text-4xl font-bold text-slate-900 tracking-tighter italic underline decoration-slate-100">{client?.name}</h2>
                        <p className="text-slate-500 text-xl font-medium">{client?.sector}</p>
                        <p className="mt-4 text-slate-400 text-sm max-w-xl italic">{client?.info}</p>
                    </div>
                </div>
                <div className="p-10 bg-[#0F172A] text-white rounded-[2.5rem] text-center border border-white/5 opacity-50 uppercase text-[10px] font-black tracking-widest italic">Módulo de documentación avanzada en desarrollo.</div>
            </div>
        );

        const AddClientModal = ({ onAdd, onClose }) => {
            const [formData, setFormData] = React.useState({ name: '', sector: '', status: 'Activo', info: '' });
            return (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl overflow-hidden animate-fade-in">
                        <div className="p-10 border-b bg-slate-50 flex justify-between items-center">
                            <div><h2 className="text-3xl font-bold italic tracking-tighter">Nuevo <span className="text-emerald-600">Socio</span></h2><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">González Robles & Asociados</p></div>
                            <button onClick={onClose} className="p-2 text-slate-400 hover:text-rose-500 transition-colors"><LucideIcon name="x" size={24} /></button>
                        </div>
                        <form className="p-10 space-y-6" onSubmit={(e) => { e.preventDefault(); onAdd(formData); }}>
                            <div className="grid grid-cols-2 gap-4">
                                <input placeholder="Nombre" required className="p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, name: e.target.value})} />
                                <input placeholder="Sector" required className="p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, sector: e.target.value})} />
                            </div>
                            <textarea placeholder="Descripción técnica operativa..." className="w-full p-4 bg-slate-50 rounded-xl h-24 border outline-none focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, info: e.target.value})}></textarea>
                            <button type="submit" className="w-full bg-[#0F172A] text-white p-5 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-emerald-600 transition-all shadow-lg">Registrar Empresa</button>
                        </form>
                    </div>
                </div>
            );
        };

        const LigieTechnical = () => (
            <div className="space-y-8 animate-fade-in">
                <div className="bg-white p-8 rounded-[2rem] border shadow-sm border-l-8 border-l-emerald-500"><h2 className="text-3xl font-bold italic text-slate-900 uppercase">LIGIE 2026 Técnico</h2><p className="text-slate-500 italic">Análisis de la Séptima Enmienda</p></div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 italic text-sm">
                    <div className="p-10 bg-white border rounded-[3rem] shadow-xl space-y-6">
                        <p className="font-black text-emerald-600 uppercase tracking-widest border-b pb-2">Estructura Arancelaria</p>
                        <div className="space-y-4">
                            <div className="flex gap-4 items-center"><div className="w-12 h-12 bg-slate-900 text-white rounded-lg flex items-center justify-center font-bold">61</div><p className="font-bold underline">Capítulo Têxtil (Ponto)</p></div>
                            <div className="flex gap-4 items-center"><div className="w-12 h-12 bg-emerald-600 text-white rounded-lg flex items-center justify-center font-bold">01</div><p className="font-bold underline">Fração Aduaneira</p></div>
                        </div>
                    </div>
                    <div className="p-10 bg-[#0F172A] text-white rounded-[3rem] shadow-2xl flex flex-col justify-center border-r-8 border-r-emerald-500">
                        <h4 className="text-2xl font-bold italic text-emerald-400 mb-4 tracking-tighter">Seguridad Técnica</h4>
                        <p className="text-slate-400 leading-relaxed italic pr-8">Actualización centrada en la rastreabilidad absoluta de origen para evitar multas por datos inexactos.</p>
                    </div>
                </div>
            </div>
        );

        const EmergencyProtocols = () => (
            <div className="space-y-8">
                <div className="bg-rose-50 p-8 rounded-[2rem] border border-rose-100 border-l-8 border-l-rose-600 shadow-sm">
                    <h2 className="text-3xl font-bold text-rose-600 italic uppercase">Protocolos de Crisis SOS</h2>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className="p-10 bg-rose-600 text-white rounded-[3rem] shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-10"><LucideIcon name="alert-triangle" size={120} /></div>
                        <h3 className="text-2xl font-bold italic border-b border-white/20 pb-4 mb-6 uppercase flex items-center gap-3">Alerta de Semáforo</h3>
                        <p className="text-sm italic font-bold mb-8 text-rose-100 leading-relaxed">Riesgo inminente de PAMA por discrepancia técnica. Movilización inmediata del equipo legal de González Robles.</p>
                        <div className="p-4 bg-white/10 rounded-xl border border-white/10 flex items-center gap-3 w-fit">
                            <div className="w-8 h-8 rounded-full bg-white text-rose-600 flex items-center justify-center font-black text-xs">01</div>
                            <p className="text-[10px] font-black uppercase tracking-widest">Movilización Legal In-Situ</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- SHARED UI ---
        const KPIBoxSmall = ({ label, value, color }) => (
            <div className="bg-white border px-10 py-5 rounded-[2rem] shadow-sm flex flex-col items-center">
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                <p className={`text-3xl font-black italic ${color === 'blue' ? 'text-blue-600' : 'text-emerald-600'}`}>{value}</p>
            </div>
        );

        const SearchLoader = () => (
            <div className="bg-white p-10 rounded-[3rem] border border-emerald-200 shadow-2xl flex items-center justify-center gap-6 animate-pulse">
                <div className="p-3 bg-emerald-50 rounded-full"><LucideIcon name="loader-2" className="animate-spin text-emerald-600" size={32} /></div>
                <p className="font-black text-slate-800 italic text-lg tracking-tight underline decoration-emerald-200 uppercase">Traduciendo y consultando inteligencia 2026...</p>
            </div>
        );

        const SearchResults = ({ results, onClose }) => (
            <div className="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-2xl relative animate-fade-in border-t-8 border-t-emerald-600">
                <button onClick={onClose} className="absolute top-6 right-6 text-slate-400 hover:text-rose-500 transition-all"><LucideIcon name="x" size={24} /></button>
                <div className="flex items-center gap-3 mb-6 text-emerald-600 font-black uppercase text-xs tracking-widest">
                    <LucideIcon name="languages" size={18} /> Traducción & Inteligencia Aduanera
                </div>
                <div className="text-sm leading-relaxed whitespace-pre-line mb-8 italic text-slate-700 font-medium max-h-[300px] overflow-y-auto pr-4 custom-scrollbar">
                    {String(results.text)}
                </div>
                {results.sources?.length > 0 && (
                    <div className="border-t border-slate-100 pt-6">
                        <p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest italic">Fuentes Internacionales:</p>
                        <div className="flex flex-wrap gap-2">
                            {results.sources.map((s, i) => (
                                <a key={i} href={s.uri} target="_blank" className="text-[10px] text-emerald-700 bg-emerald-50 border px-3 py-1.5 rounded-full font-bold hover:bg-emerald-600 hover:text-white transition-all shadow-sm uppercase tracking-tighter">
                                    {s.title}
                                </a>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
